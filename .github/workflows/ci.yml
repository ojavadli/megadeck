name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install LibreOffice (for preview pipeline tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils
        if: runner.os == 'Linux'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check megadeck tests

      - name: Format check with ruff
        run: ruff format --check megadeck tests

      - name: Run pytest
        run: pytest -v --cov=megadeck --cov-report=term-missing
        env:
          # Tests that need LLM access skip themselves if no key is set.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
